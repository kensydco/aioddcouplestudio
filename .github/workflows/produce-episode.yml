name: Produce approved episode

on:
  workflow_dispatch:
    inputs:
      topic_file:
        description: Approved topic JSON path
        required: true
        default: topics/approved/example.json

permissions:
  contents: read

jobs:
  produce:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - run: npm ci
      - run: npx hyperframes browser ensure
      - run: npm test
      - run: npm run readiness
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          HEYGEN_API_KEY: ${{ secrets.HEYGEN_API_KEY }}
          HEYGEN_STUDIO_BACKGROUND_URL: ${{ secrets.HEYGEN_STUDIO_BACKGROUND_URL }}
      - run: npm run episode -- --topic "${{ inputs.topic_file }}"
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-5.5' }}
          HEYGEN_API_KEY: ${{ secrets.HEYGEN_API_KEY }}
          HEYGEN_STUDIO_BACKGROUND_URL: ${{ secrets.HEYGEN_STUDIO_BACKGROUND_URL }}
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-odd-couple-production-${{ github.run_id }}
          path: episodes/
          if-no-files-found: warn
          retention-days: 30
