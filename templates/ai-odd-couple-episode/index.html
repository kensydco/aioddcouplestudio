<!doctype html>
<html>
<head><meta charset="utf-8"><style>
*{box-sizing:border-box}body{margin:0;background:#1C1C20;color:#FBF7F0;font-family:Montserrat,Arial,sans-serif;overflow:hidden}
#ai-odd-couple{position:relative;width:1080px;height:1920px;background:radial-gradient(circle at 50% 35%,#3b303b,#1C1C20 60%)}
.title{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;padding:120px;text-align:center;font:700 92px Poppins,Arial,sans-serif}
.bar{position:absolute;left:0;right:0;bottom:300px;height:18px;background:linear-gradient(90deg,#CE1141 0 50%,#9B7EBD 50%)}
.cta{position:absolute;left:80px;right:80px;bottom:350px;text-align:center;font-size:64px;font-weight:800;text-shadow:0 4px 0 #000}
</style></head>
<body><div id="ai-odd-couple" data-composition-id="ai-odd-couple" data-start="0" data-width="1080" data-height="1920">
<div id="title" class="title clip" data-start="0" data-duration="30" data-track-index="1">THE A.I. ODD COUPLE</div>
<div id="bar" class="bar clip" data-start="0" data-duration="30" data-track-index="2"></div>
<div id="cta" class="cta clip" data-start="27" data-duration="3" data-track-index="3">Even WE can understand it!</div>
</div><script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script><script>
window.__timelines=window.__timelines||{};const tl=gsap.timeline({paused:true});
tl.from("#title",{opacity:0,scale:.92,duration:.7,ease:"power3.out"},.2);
tl.from("#bar",{scaleX:0,duration:.6,ease:"expo.out"},.3);
tl.from("#cta",{opacity:0,y:50,duration:.6,ease:"back.out(1.5)"},27);
tl.to("#title",{opacity:0,duration:.5,ease:"power2.in"},29.4);
window.__timelines["ai-odd-couple"]=tl;
</script></body></html>
